server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }

    location /_next {
        alias /usr/share/nginx/html/_next;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
