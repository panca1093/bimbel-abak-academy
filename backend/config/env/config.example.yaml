# Template for <env>/config.yaml (non-secret values). For local dev:
#   cp config.example.yaml dev/config.yaml
#   cp secrets.example.yaml dev/secrets.yaml
# Hostnames below match the docker-compose network; for bare `go run` against
# host-mapped ports use localhost:5432 / localhost:6379 / localhost:9000.
http_port: "8080"
redis_addr: "redis:6379"
worker_poll_interval: "5s"
cors_origins:
  - "http://localhost:3000"
access_token_ttl: "15m"
refresh_token_ttl: "168h"
otp_ttl: "5m"
google_client_id: ""
fazpass_base_url: "https://api.fazpass.com"
midtrans_env: "sandbox"
# SMTP for email OTP/notifications. Leave smtp_host empty to fall back to Fazpass
# (or the Noop logger when Fazpass is also unset). Username/password go in secrets.
smtp_host: ""
smtp_port: "587"
smtp_from: ""
smtp_from_name: ""
object_storage_endpoint: "minio:9000"
object_storage_public_endpoint: "localhost:9000"
object_storage_use_ssl: false
object_storage_region: "us-east-1"
object_storage_bucket_name: "akademi-bimbel"
object_storage_private_bucket_name: "akademi-bimbel-private"

# Gotenberg (HTML->PDF renderer) sidecar URL. Deploy-topology, not a secret;
# points at the compose service.
gotenberg_url: "http://gotenberg:3000"
