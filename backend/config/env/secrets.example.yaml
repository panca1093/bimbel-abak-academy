# Template for environment-specific secrets files.
# Copy this file to staging/secrets.yaml or prod/secrets.yaml and fill in real values.
# NEVER commit real secret values.
#
# Required secrets (must be non-empty for staging/prod):
database_url: "postgres://user:password@host:5432/dbname?sslmode=require"
jwt_secret: "replace-with-a-strong-random-secret"
config_encryption_key: "replace-with-a-64-character-hex-key"
otp_secret: "replace-with-otp-secret"
minio_access_key: "replace-with-minio-access-key"
minio_secret_key: "replace-with-minio-secret-key"
# Optional secrets (safe to leave empty if feature is unused):
redis_password: ""
fazpass_merchant_key: ""
fazpass_api_key: ""
midtrans_server_key: ""
midtrans_client_key: ""
