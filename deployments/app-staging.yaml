# Staging runtime manifest — single combined VM (abak-app-stg).
#
# Not a build tool: images are pulled from GHCR by commit SHA, never built here.
# Deploy with:
#   IMAGE_TAG=<commit-sha> docker compose -f deployments/app-staging.yaml up -d
# (IMAGE_TAG and the postgres creds come from a hand-placed deployments/.env —
#  see .env.example.)
#
# Prerequisites on the box, out of band (not in this file):
#   - deployments/secrets/staging-secrets.yaml  hand-placed, gitignored (JWT, DB
#     url, object-storage HMAC keys, Midtrans keys). Mounted into api + worker.
#   - GCS buckets akademi-bimbel-staging (public-read via IAM) and
#     akademi-bimbel-private-staging created with `gcloud storage buckets create`.
#   - A Let's Encrypt cert for stg.abakacademy.id under /etc/letsencrypt (see
#     deployments/nginx/nginx.conf for the issuance runbook).
#
# Object storage is GCS, so there is no minio service here. Only nginx publishes
# ports; postgres/redis/api/web are reachable only on the internal network.

name: abak-staging

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?set in deployments/.env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in deployments/.env}
      POSTGRES_DB: ${POSTGRES_DB:?set in deployments/.env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    image: ghcr.io/panca1093/bimbel-abak-academy/api:${IMAGE_TAG:?set IMAGE_TAG to the deployed commit SHA}
    restart: unless-stopped
    environment:
      APP_ENV: staging
    volumes:
      - ./secrets/staging-secrets.yaml:/app/config/env/staging/secrets.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    image: ghcr.io/panca1093/bimbel-abak-academy/worker:${IMAGE_TAG:?set IMAGE_TAG to the deployed commit SHA}
    restart: unless-stopped
    environment:
      APP_ENV: staging
    volumes:
      - ./secrets/staging-secrets.yaml:/app/config/env/staging/secrets.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    image: ghcr.io/panca1093/bimbel-abak-academy/web:staging-${IMAGE_TAG:?set IMAGE_TAG to the deployed commit SHA}
    restart: unless-stopped
    depends_on:
      - api

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - certbot-webroot:/var/www/certbot
    depends_on:
      - api
      - web

volumes:
  pgdata:
  certbot-webroot:
