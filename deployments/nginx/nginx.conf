# Staging front door for stg.abakacademy.id. Single public entrypoint:
# /api -> Go API, everything else -> Next.js. TLS terminates here.
#
# Cert issuance (one-off, before first `up` — nginx will not start if the cert
# path is missing). With the stack down so :80 is free:
#   certbot certonly --standalone -d stg.abakacademy.id
# Renewals happen via the webroot below while nginx stays up:
#   certbot renew --webroot -w /var/www/certbot  (systemd timer on the host)
# Reload after renew:  docker compose -f deployments/app-staging.yaml exec nginx nginx -s reload

upstream web {
    server web:3000;
}

upstream api {
    server api:8080;
}

server {
    listen 80;
    server_name stg.abakacademy.id;

    # ACME HTTP-01 challenge for certbot renewals.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Everything else is HTTPS-only.
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name stg.abakacademy.id;

    ssl_certificate     /etc/letsencrypt/live/stg.abakacademy.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/stg.abakacademy.id/privkey.pem;

    location /api/ {
        proxy_pass http://api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
