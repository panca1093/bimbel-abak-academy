# Copy to deployments/secrets/staging-secrets.yaml on the box (gitignored) and
# fill every value. Mounted read-only into api + worker at
# /app/config/env/staging/secrets.yaml — the config loader reads it alongside the
# baked-in config.yaml. Never commit real values.
#
# Required (fail-fast: api/worker refuse to start if any is empty):
database_url: "postgres://akademi:CHANGE_ME@postgres:5432/akademi?sslmode=disable"
jwt_secret: ""
config_encryption_key: ""            # 32-byte hex
otp_secret: ""
# GCS S3-interop HMAC key (Cloud Console -> Storage -> Settings -> Interoperability):
object_storage_access_key: ""
object_storage_secret_key: ""
# Optional (leave empty to disable the feature):
redis_password: ""
fazpass_merchant_key: ""
fazpass_api_key: ""
# Midtrans keys are normally entered in the admin dashboard (DB-sourced); these
# are only a fallback. Leaving them empty means the payment webhook rejects every
# call until keys are set — which is the correct secure default.
midtrans_server_key: ""
midtrans_client_key: ""
# SMTP for email OTP (config.yaml already sets smtp_host=smtp.gmail.com on staging).
# Gmail: smtp_username = full address, smtp_password = 16-char App Password (no spaces).
smtp_username: ""
smtp_password: ""
