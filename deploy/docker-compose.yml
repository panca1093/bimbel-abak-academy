name: akademi-bimbel

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: akademi
      POSTGRES_PASSWORD: akademi
      POSTGRES_DB: akademi
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U akademi"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
      target: api
    environment:
      APP_ENV: development
      HTTP_PORT: 8080
      DATABASE_URL: postgres://akademi:akademi@postgres:5432/akademi?sslmode=disable
      REDIS_ADDR: redis:6379
      JWT_SECRET: dev-secret-change-me-in-production
      ACCESS_TOKEN_TTL: 15m
      REFRESH_TOKEN_TTL: 168h
      OTP_TTL: 5m
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      WEB_ORIGIN: http://localhost:3000
      MINIO_ENDPOINT: minio:9000
      MINIO_PUBLIC_ENDPOINT: localhost:9000
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started

  worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
      target: worker
    environment:
      DATABASE_URL: postgres://akademi:akademi@postgres:5432/akademi?sslmode=disable
      REDIS_ADDR: redis:6379
      WORKER_POLL_INTERVAL: 5s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: ../web
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8080/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  pgdata:
  miniodata:
