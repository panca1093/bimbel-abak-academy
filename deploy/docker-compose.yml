name: akademi-bimbel

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: akademi
      POSTGRES_PASSWORD: akademi
      POSTGRES_DB: akademi
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U akademi"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
      target: api
    environment:
      APP_ENV: development
      HTTP_PORT: 8080
      DATABASE_URL: postgres://akademi:akademi@postgres:5432/akademi?sslmode=disable
      REDIS_ADDR: redis:6379
      JWT_SECRET: dev-secret-change-me-in-production
      ACCESS_TOKEN_TTL: 15m
      REFRESH_TOKEN_TTL: 168h
      OTP_TTL: 5m
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      WEB_ORIGIN: http://localhost:3000
      CONFIG_ENCRYPTION_KEY: "a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f0a1b2"
      MINIO_ENDPOINT: minio:9000
      MINIO_PUBLIC_ENDPOINT: localhost:9000
      MIDTRANS_SERVER_KEY: ${MIDTRANS_SERVER_KEY:-}
      MIDTRANS_CLIENT_KEY: ${MIDTRANS_CLIENT_KEY:-}
      MIDTRANS_ENV: ${MIDTRANS_ENV:-sandbox}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started

  worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
      target: worker
    environment:
      DATABASE_URL: postgres://akademi:akademi@postgres:5432/akademi?sslmode=disable
      REDIS_ADDR: redis:6379
      WORKER_POLL_INTERVAL: 5s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: ../web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8080/api/v1
        NEXT_PUBLIC_MIDTRANS_SNAP_URL: ${NEXT_PUBLIC_MIDTRANS_SNAP_URL:-https://app.sandbox.midtrans.com/snap/snap.js}
        NEXT_PUBLIC_MIDTRANS_CLIENT_KEY: ${MIDTRANS_CLIENT_KEY:-}
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8080/api/v1
      NEXT_PUBLIC_MIDTRANS_SNAP_URL: ${NEXT_PUBLIC_MIDTRANS_SNAP_URL:-https://app.sandbox.midtrans.com/snap/snap.js}
      NEXT_PUBLIC_MIDTRANS_CLIENT_KEY: ${MIDTRANS_CLIENT_KEY:-}
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  pgdata:
  miniodata:
