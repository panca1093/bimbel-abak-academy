name: akademi-bimbel

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: akademi
      POSTGRES_PASSWORD: akademi
      POSTGRES_DB: akademi
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U akademi"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      # The exam-card download (FR-30) redirects the browser to a presigned
      # object URL, so the browser reads the PDF from this origin rather than
      # from the API. Without CORS the fetch that follows the redirect is
      # blocked. Staging/prod need the equivalent on the GCS bucket, applied
      # out of band like the bucket creation itself:
      #   gcloud storage buckets update gs://<bucket> --cors-file=deploy/storage-cors.json
      MINIO_API_CORS_ALLOW_ORIGIN: "*"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  # Buckets are created out of band (not on the request path — see
  # GeneratePresignedUploadURL). This mirrors, for local dev, the one-off
  # `gcloud storage buckets create` + IAM binding done on staging/prod.
  createbuckets:
    image: minio/mc
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadmin; do echo 'waiting for minio'; sleep 1; done;
      mc mb --ignore-existing local/akademi-bimbel;
      mc mb --ignore-existing local/akademi-bimbel-private;
      mc anonymous set download local/akademi-bimbel;
      exit 0;
      "

  # Chromium-as-a-service: renders certificate/card HTML → PDF. Keeps Chromium
  # out of the api image; reached at gotenberg_url (http://gotenberg:3000).
  gotenberg:
    image: gotenberg/gotenberg:8
    ports:
      - "3001:3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
      target: api
    environment:
      APP_ENV: ${APP_ENV:-dev}
    volumes:
      - ../backend/config/env:/app/config/env:ro
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      gotenberg:
        condition: service_healthy

  worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
      target: worker
    environment:
      APP_ENV: ${APP_ENV:-dev}
    volumes:
      - ../backend/config/env:/app/config/env:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: ../web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8080/api/v1
        NEXT_PUBLIC_MIDTRANS_SNAP_URL: ${NEXT_PUBLIC_MIDTRANS_SNAP_URL:-https://app.sandbox.midtrans.com/snap/snap.js}
        NEXT_PUBLIC_MIDTRANS_CLIENT_KEY: ${MIDTRANS_CLIENT_KEY:-}
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8080/api/v1
      NEXT_PUBLIC_MIDTRANS_SNAP_URL: ${NEXT_PUBLIC_MIDTRANS_SNAP_URL:-https://app.sandbox.midtrans.com/snap/snap.js}
      NEXT_PUBLIC_MIDTRANS_CLIENT_KEY: ${MIDTRANS_CLIENT_KEY:-}
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  pgdata:
  miniodata:
